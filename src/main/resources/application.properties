quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/lawyer}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:lawyer}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:lawyer}
quarkus.http.port=8080

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=true

quarkus.http.auth.permission.authenticated.paths=/pessoas,/pessoas/*,/usuarios,/usuarios/*,/processos,/processos/*,/movimentacoes,/movimentacoes/*,/rt/export
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.public.paths=/auth/login
quarkus.http.auth.permission.public.policy=permit

mp.jwt.verify.issuer=${JWT_ISSUER:law-office-management}
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
law-office.jwt.issuer=${JWT_ISSUER:law-office-management}
law-office.jwt.expires-in-seconds=${JWT_EXPIRES_IN_SECONDS:3600}
law-office.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:true}
law-office.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:admin}
law-office.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:Admin@123456}

quarkus.log.category."com.example.lawyer".level=INFO
quarkus.security.events.enabled=true
