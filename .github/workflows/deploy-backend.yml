name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: 029180756761.dkr.ecr.sa-east-1.amazonaws.com
          IMAGE_TAG: latest
        run: |
          docker build -t "$ECR_REGISTRY/velasco-backend:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/velasco-backend:$IMAGE_TAG"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd ~/velasco-backend
            git pull origin main

            # Recria .env com secrets
            cat > .env << 'ENVEOF'
            DB_JDBC_URL=jdbc:postgresql://${{ secrets.RDS_HOST }}:5432/lawyer
            DB_USERNAME=${{ secrets.RDS_USER }}
            DB_PASSWORD=${{ secrets.RDS_PASSWORD }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_EXPIRES_IN_SECONDS=${{ secrets.JWT_EXPIRES_IN_SECONDS }}
            BOOTSTRAP_ADMIN_ENABLED=${{ secrets.BOOTSTRAP_ADMIN_ENABLED }}
            BOOTSTRAP_ADMIN_USERNAME=${{ secrets.BOOTSTRAP_ADMIN_USERNAME }}
            BOOTSTRAP_ADMIN_PASSWORD=${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
            ENVEOF

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin 029180756761.dkr.ecr.sa-east-1.amazonaws.com
            docker compose pull
            docker compose up -d
            docker compose logs backend
